<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Léo | Portfolio Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --text: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            z-index: -1;
        }

        /* Menu Hamburger à gauche */
        .menu-toggle {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
        }

        .bar { width: 30px; height: 3px; background-color: white; border-radius: 2px; transition: 0.3s; }

        /* Musique à droite */
        .music-control {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1000;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        /* Sidebar Navigation */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            z-index: 999;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            padding: 100px 40px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar.active { left: 0; }

        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            transition: 0.3s;
            opacity: 0.7;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active { opacity: 1; color: var(--primary); padding-left: 10px; }

        /* Sections */
        .page-section {
            display: none;
            width: 100%;
            min-height: 100vh;
            padding: 100px 5%;
            animation: fadeIn 0.6s ease;
        }

        .page-section.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .hero { text-align: center; max-width: 900px; }
        .hero h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .highlight {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            margin-top: 50px;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover { transform: translateY(-12px); border-color: var(--primary); }

        .img-box {
            width: 100%;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .logo-text {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .nova-logo { color: #ffcc00; text-shadow: 0 0 15px rgba(255, 204, 0, 0.5); }
        .zen-logo { color: #00f2ff; text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }

        .project-info { padding: 25px; text-align: center; background: rgba(15, 23, 42, 0.3); }

        .btn {
            padding: 1.2rem 2.8rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            margin-top: 2rem;
            display: inline-block;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="music-control" id="musicBtn">
        <span id="musicIcon">🔇</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div class="menu-toggle" id="menuBtn">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="nav-link active" onclick="showPage('accueil')">Accueil</div>
        <div class="nav-link" onclick="showPage('projets')">Projets</div>
    </nav>

    <section id="accueil" class="page-section active">
        <div class="hero">
            <h1>Salut, je m'appelle <span class="highlight">Léo</span>, je fais des jeux en code HTML avec <span class="highlight">Gemini</span></h1>
            <button class="btn" onclick="showPage('projets')">Découvrir mes projets</button>
        </div>
    </section>

    <section id="projets" class="page-section">
        <h2 style="font-size: 3rem; font-weight: 900; margin-bottom: 20px;">Mes <span class="highlight">Projets</span></h2>
        <div class="projects-grid">
            <a href="https://nova-strike-sage.vercel.app" target="_blank" class="project-card">
                <div class="img-box"><div class="logo-text nova-logo">NOVA<br>STRIKE</div></div>
                <div class="project-info"><h3>Nova Strike</h3></div>
            </a>
            <a href="https://leoxx35.github.io" target="_blank" class="project-card">
                <div class="img-box"><div class="logo-text zen-logo">ZEN<br>FLUX</div></div>
                <div class="project-info"><h3>Zen Flux</h3></div>
            </a>
        </div>
    </section>

    <script>
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        const musicIcon = document.getElementById('musicIcon');
        let isPlaying = false;

        musicBtn.addEventListener('click', () => {
            if (isPlaying) { bgMusic.pause(); musicIcon.innerText = "🔇"; }
            else { bgMusic.play(); musicIcon.innerText = "🔊"; }
            isPlaying = !isPlaying;
        });

        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            const bars = document.querySelectorAll('.bar');
            bars[0].style.transform = sidebar.classList.contains('active') ? 'rotate(45deg) translate(7px, 6px)' : 'none';
            bars[1].style.opacity = sidebar.classList.contains('active') ? '0' : '1';
            bars[2].style.transform = sidebar.classList.contains('active') ? 'rotate(-45deg) translate(7px, -6px)' : 'none';
        });

        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            sidebar.classList.remove('active');
            const bars = document.querySelectorAll('.bar');
            bars.forEach(b => b.style.transform = 'none');
            bars[1].style.opacity = '1';
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
